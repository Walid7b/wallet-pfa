name: CI Pipeline — DevSecOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:

  # ══════════════════════════════════════════════════════════════
  # PHASE 2 — Job 1 : SAST
  # Analyse statique du code Python (règles OWASP + sécurité Python)
  # Bloque sur les vulnérabilités de sévérité ERROR (injection, RCE…)
  # ══════════════════════════════════════════════════════════════
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            app/

  # ══════════════════════════════════════════════════════════════
  # PHASE 2 — Job 2 : Détection de secrets
  # Gitleaks scanne tout l'historique git
  # Cible : SECRET_KEY hardcodée dans app/auth.py
  # ══════════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scanning — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact

  # ══════════════════════════════════════════════════════════════
  # PHASE 2 — Job 3 : Audit des dépendances
  # Cible : CVE-2023-32681 dans requests==2.28.1
  # ══════════════════════════════════════════════════════════════
  dependency-audit:
    name: Dependency Audit — pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt --desc

  # ══════════════════════════════════════════════════════════════
  # PHASE 3 — Job 4 : Build Docker
  # Construit l'image et la sauvegarde en tarball pour le scan Trivy
  # ══════════════════════════════════════════════════════════════
  build:
    name: Build — Docker Image
    runs-on: ubuntu-latest
    needs: [sast, secret-scan, dependency-audit]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: wallet-pfa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Exporter l'image en tarball compressé
        run: docker save wallet-pfa:${{ github.sha }} | gzip > wallet-pfa.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: wallet-pfa.tar.gz
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # PHASE 3 — Job 5 : Scan CVE de l'image Docker (Trivy)
  # Bloque si CVE CRITICAL ou HIGH détectée
  # Cible : cryptography==38.0.4 → CVE-2023-0286 (HIGH, CVSS 7.4)
  # ══════════════════════════════════════════════════════════════
  image-scan:
    name: Image Scan — Trivy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Scan image avec Trivy (bloquant)
        # exit-code 1 → bloque le pipeline si CVE CRITICAL ou HIGH trouvée
        # ignore-unfixed → ignore les CVE sans correctif disponible (réduit le bruit)
        # vuln-type os,library → scanne les paquets OS ET les libs Python
        uses: aquasecurity/trivy-action@master
        with:
          input: wallet-pfa.tar.gz
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Exporter rapport Trivy JSON
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          input: wallet-pfa.tar.gz
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload rapport Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # PHASE 4 : Déploiement Kubernetes — à venir
  # ══════════════════════════════════════════════════════════════
