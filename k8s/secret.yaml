apiVersion: v1
kind: Secret
metadata:
  name: wallet-secret
  labels:
    app: wallet-pfa
type: Opaque
data:
  # Générer avec : [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("votre-mdp"))
  # ou sous Linux : echo -n "votre-mdp" | base64

  # "wallet_pass" encodé en base64
  DB_PASSWORD: d2FsbGV0X3Bhc3M=

  # "wallet-pfa-production-jwt-secret-32c" encodé en base64
  # REMPLACER par un vrai secret aléatoire : openssl rand -base64 32
  SECRET_KEY: d2FsbGV0LXBmYS1wcm9kdWN0aW9uLWp3dC1zZWNyZXQtMzJj
